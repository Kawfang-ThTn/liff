      async function getUserProfile() {
        try {
          const profile = await liff.getProfile();

          const pictureEl = document.getElementById("pictureUrl");
          const displayNameEl = document.getElementById("displayName");
          const userIdEl = document.getElementById("userId");

          if (pictureEl && profile.pictureUrl) {
            pictureEl.src = profile.pictureUrl;
          }

          if (displayNameEl) {
            displayNameEl.innerText = profile.displayName || "";
          }

          if (userIdEl) {
            userIdEl.value = profile.userId || "";
          }
        } catch (err) {
          console.error("Failed to get profile:", err);
          alert("ไม่สามารถดึงข้อมูลโปรไฟล์ LINE ได้");
        }
      }

            );
            if (goAdd) {
              window.location.href = "https://line.me/R/ti/p/@YOUR-BOT-ID";
            }
          }
        } catch (err) {
          console.error("Failed to get friendship:", err);
        }
      }

      async function checkCustomer() {
        const idcard = document
          .getElementById("input_customer_id")
          .value.trim();
        const btn = document.getElementById("btnRegister");

        if (!idcard) {
          alert("กรุณากรอกเลขบัตรประชาชน");
          return;
        }

        if (idcard.length !== 13) {
          alert("เลขบัตรประชาชนต้องมี 13 หลัก");
          return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังตรวจสอบ...";

        const API_URL =
          "https://capital-navigate-shallow.ngrok-free.dev/api/check-cust";

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({
              idcard: idcard,
            }),
          });

          const text = await response.text();
          let result = {};

          try {
            result = JSON.parse(text);
          } catch (e) {
            throw new Error("Response ไม่ใช่ JSON: " + text);
          }

          if (response.ok && result.success) {
            alert(
              "พบข้อมูลลูกค้า: " +
                (result.data?.name ||
                  result.data?.customer_name ||
                  "ไม่ระบุชื่อ"),
            );
          } else {
            alert(result.message || "ไม่พบข้อมูลลูกค้า");
          }
        } catch (error) {
          console.error("Check customer error:", error);
          alert("ไม่สามารถติดต่อ Server ได้: " + error.message);
        } finally {
          btn.disabled = false;
          btn.innerText = "ตรวจสอบข้อมูล";
        }
      }

      async function main() {
        try {
          await liff.init({ liffId: "2009812371-Yf0qjao3" });

            liff.login();
            return;

          await getUserProfile();
          await getFriendship();
        } catch (err) {
