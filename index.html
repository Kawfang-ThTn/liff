<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover" />
    <title>ลงทะเบียนรับเอกสาร</title>
    <link rel="stylesheet" href="css/style.css" media="all" />
  </head>
  <body>
    <img id="pictureUrl" style="width: 100px; border-radius: 50%; margin: 20px auto; display: block;" />
    <p id="displayName" style="text-align: center; font-weight: bold"></p>

    <div id="registration-form" style="padding: 20px">
      
      <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; display: block;">LINE User ID:</label>
        <input type="text" id="userId" readonly 
            style="width: 100%; padding: 10px; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 8px; color: #666;">
      </div>

      <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; display: block;">รหัสลูกค้า / เลขบัตรประชาชน:</label>
        <input type="text" id="input_customer_id" placeholder="กรุณากรอกรหัสของคุณ" 
            style="width: 100%; padding: 10px; border: 1px solid #06C755; border-radius: 8px;">
      </div>

      <div style="margin-bottom: 15px">
        <label style="font-weight: bold; display: block;">เบอร์โทรศัพท์:</label>
        <input type="tel" id="input_phone" placeholder="08xxxxxxxx"
          style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px;" />
      </div>

      <button id="btnRegister" onclick="registerToLaravel()"
        style="background-color: #06c755; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer;">
        ยืนยันลงทะเบียน
      </button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
      // ฟังก์ชันดึงโปรไฟล์และใส่ค่าใน Input
      async function getUserProfile() {
        try {
          const profile = await liff.getProfile();
          if (document.getElementById("pictureUrl")) document.getElementById("pictureUrl").src = profile.pictureUrl;
          if (document.getElementById("displayName")) document.getElementById("displayName").innerText = profile.displayName;
          
          // แก้ไข: ใช้ .value สำหรับช่อง input
          if (document.getElementById("userId")) {
            document.getElementById("userId").value = profile.userId;
          }
        } catch (err) {
          console.error("Failed to get profile", err);
        }
      }

      // เช็คสถานะการเป็นเพื่อน
      async function getFriendship() {
        const friend = await liff.getFriendship();
        if (!friend.friendFlag) {
          if (confirm("กรุณาเพิ่มเราเป็นเพื่อน เพื่อรับแจ้งเตือนเอกสาร")) {
            window.location = "https://line.me/R/ti/p/@YOUR-BOT-ID"; // เปลี่ยนเป็น ID ของคุณ
          }
        }
      }

      // ส่งข้อมูลไป Laravel
      async function registerToLaravel() {
        const userId = document.getElementById("userId").value;
        const customerId = document.getElementById("input_customer_id").value;
        const phone = document.getElementById("input_phone").value;

        if (!customerId || !phone) {
          alert("กรุณากรอกข้อมูลให้ครบถ้วน");
          return;
        }

        const btn = document.getElementById("btnRegister");
        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        const API_URL = "https://your-laravel-domain.com/api/register-line";

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json",
            },
            body: JSON.stringify({
              line_user_id: userId,
              customer_id: customerId,
              phone: phone,
            }),
          });

          const result = await response.json();

          if (result.success) {
            alert("ลงทะเบียนสำเร็จ!");
            liff.closeWindow();
          } else {
            alert("ผิดพลาด: " + result.message);
            btn.disabled = false;
            btn.innerText = "ยืนยันลงทะเบียน";
          }
        } catch (error) {
          console.error("Error:", error);
          alert("ไม่สามารถติดต่อ Server ได้ (ตรวจสอบ CORS)");
          btn.disabled = false;
          btn.innerText = "ยืนยันลงทะเบียน";
        }
      }

      async function main() {
        try {
          await liff.init({ liffId: "2009812371-Yf0qjao3" });
          if (liff.isLoggedIn()) {
            getUserProfile();
            getFriendship();
          } else {
            liff.login();
          }
        } catch (err) {
          console.error("LIFF Init failed", err);
        }
      }
      main();
    </script>
  </body>
</html>
